services:
  database:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-auditor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-auditor_dev}
      POSTGRES_DB: ${POSTGRES_DB:-library_auditor}
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://auditor:auditor_dev@database:5432/library_auditor}
      ACCESS_CODE: ${ACCESS_CODE:-LIBRARY2027}
    ports:
      - "8010:8000"
    depends_on:
      - database

  frontend:
    build: ./frontend
    ports:
      - "3010:80"
    depends_on:
      - backend

volumes:
  pgdata:
